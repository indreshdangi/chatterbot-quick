<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Indresh 2.0 — Multi-Model</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root{
      --bg:#0d0d15; --panel:#161622; --user:#2a2a3a; --ai:#1e1e2e;
      --text:#f0f0f0; --muted:rgba(255,255,255,0.6); --accent:#e0a0ff; --border:rgba(255,255,255,0.06);
    }
    .light{ --bg:#f2f4f8; --panel:rgba(255,255,255,0.9); --user:#f7f7fb; --ai:#ffffff; --text:#111; --muted:rgba(0,0,0,0.5); --accent:#6b5dfc; --border:rgba(16,16,24,0.06); }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; padding:12px;}
    .card{width:940px;max-width:96%;background:var(--panel);border-radius:12px;padding:12px;border:1px solid var(--border);display:flex;flex-direction:column;height:88vh;box-shadow:0 10px 30px rgba(0,0,0,0.35);overflow:hidden}
    .header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;gap:8px}
    .logo{display:flex;gap:10px;align-items:center}
    .logo-icon{width:42px;height:42;border-radius:50%;background:linear-gradient(135deg,#d0a0ff,#a080ff);display:flex;align-items:center;justify-content:center;color:#111;font-weight:800}
    .tiny{font-size:12px;color:var(--muted)}
    .controls{display:flex;gap:8px;align-items:center}
    select,button{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;cursor:pointer}
    .model-note{font-size:12px;color:var(--muted);min-width:220px}
    .messages{flex:1;overflow:auto;padding:12px 18px}
    .msg{margin-bottom:12px;max-width:78%;position:relative;word-break:break-word}
    .msg.ai{align-self:flex-start}
    .msg.user{align-self:flex-end;text-align:right}
    .bubble{padding:12px;border-radius:12px;background:var(--ai);box-shadow:0 6px 18px rgba(0,0,0,0.25);color:var(--text)}
    .bubble.user{background:var(--user)}
    .meta{font-size:12px;opacity:0.9;margin-bottom:6px;color:var(--muted)}
    .copy-btn{position:absolute;right:-38px;top:6px;font-size:16px;opacity:0;cursor:pointer;transition:opacity .12s;color:var(--accent);background:transparent;border:none}
    .msg:hover .copy-btn{opacity:1}
    .footer{display:flex;gap:8px;padding:8px;border-top:1px solid var(--border);align-items:center}
    input[type="text"]{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);outline:none}
    .send{padding:10px 16px;border-radius:10px;background:linear-gradient(135deg,#d0a0ff,#a080ff);border:none;color:#111;font-weight:700;cursor:pointer}
    .disclaimer{font-size:12px;color:var(--muted);padding:10px 12px;border-top:1px solid var(--border);margin-top:6px}
    @media (max-width:520px){
      .card{height:100vh;padding:8px;border-radius:8px}
      .header{flex-direction:column;align-items:flex-start;gap:8px}
      .controls{width:100%;display:flex;flex-wrap:wrap}
      .model-note{display:none}
      .messages{padding:6px}
      input[type="text"]{font-size:15px}
    }
  </style>
</head>
<body>
  <div class="card" id="app" role="application" aria-label="Indresh 2.0 chat">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">AI</div>
        <div>
          <div style="font-weight:700">INDRESH 2.0</div>
          <div class="tiny">आपका सहायक</div>
        </div>
      </div>

      <div class="controls">
        <!-- Model select is shown only if env MODEL_SELECT_VISIBLE true.
             Front-end will hide it if server printed MODEL_SELECT_VISIBLE=false in /api/config (simpler: check window.CONFIG supplied below) -->
        <select id="model-select" aria-label="Model selector">
          <option value="llama_default">Llama 3.1 8B Instant (Groq)</option>
          <option value="gemini_1_5">Gemini 1.5 Flash (Google)</option>
        </select>
        <div id="model-note" class="model-note">Loading model info…</div>

        <button id="historyBtn" title="History">History</button>
        <button id="copyAllBtn" title="Copy all">Copy All</button>
        <button id="clearBtn" title="Clear">Clear</button>
        <button id="themeBtn" title="Theme">Theme</button>
      </div>
    </div>

    <div class="messages" id="messages" role="log" aria-live="polite">
      <div class="msg ai">
        <div class="meta"><strong>Indresh 2.0</strong> • Just now</div>
        <div class="bubble">नमस्ते! मैं Indresh 2.0 हूँ — आपका सहायक।</div>
        <button class="copy-btn" data-text="नमस्ते! मैं Indresh 2.0 हूँ — आपका सहायक।">📄</button>
      </div>
    </div>

    <div class="footer">
      <input id="input" type="text" placeholder="Message Indresh 2.0..." aria-label="Message input">
      <button class="send" id="sendBtn" type="button">Send</button>
    </div>

    <div class="disclaimer">
      <strong>Note:</strong> AI information may be incorrect. Do not fully rely on it for important decisions. We are not responsible for outcomes.
    </div>
  </div>

<script>
(async function(){
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyAllBtn = document.getElementById('copyAllBtn');
  const modelSel = document.getElementById('model-select');
  const modelNote = document.getElementById('model-note');
  const themeBtn = document.getElementById('themeBtn');

  // config fetched from server (we will expose MODEL_SELECT_VISIBLE via window.CONFIG)
  let CONFIG = { modelSelectVisible: false, groqDefault: "llama-3.1-8b-instant", geminiModel: "gemini-1.5-flash" };
  try {
    // try ping server to read printed values (server logs not accessible here) - but we'll use defaults
    // If you want remote config, implement /api/config endpoint in server. For now we default.
  } catch(e){}

  // hide model select if MODEL_SELECT_VISIBLE false
  const visible = (CONFIG.modelSelectVisible === true);
  if (!visible) modelSel.style.display = "none";

  // set default select by env: default = groq
  modelSel.value = "llama_default";
  modelNote.textContent = "Llama 3.1 (Groq) selected by default.";

  const convId = localStorage.getItem('conv_v2') || Date.now().toString();
  localStorage.setItem('conv_v2', convId);

  function addMessage(role, text, isUser=false){
    const wrapper = document.createElement('div'); wrapper.className = 'msg ' + (isUser ? 'user':'ai');
    const meta = document.createElement('div'); meta.className='meta';
    meta.innerHTML = `<strong>${isUser ? 'You' : 'Indresh 2.0'}</strong> • ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    const bubble = document.createElement('div'); bubble.className='bubble' + (isUser? ' user':'' ); bubble.textContent = text || '';
    const copyBtn = document.createElement('button'); copyBtn.className='copy-btn'; copyBtn.textContent='📄'; copyBtn.dataset.text = text || '';
    copyBtn.addEventListener('click', async ()=>{ try{ await navigator.clipboard.writeText(copyBtn.dataset.text||''); copyBtn.textContent='✓'; setTimeout(()=>copyBtn.textContent='📄',1200);}catch(e){alert('copy failed')} });
    wrapper.appendChild(meta); wrapper.appendChild(bubble); wrapper.appendChild(copyBtn);
    messagesEl.appendChild(wrapper); messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendToServer(userText){
    const modelKey = modelSel.value;
    // map front-end keys to server-expectations
    let modelParam = "";
    if (modelKey === "llama_default") modelParam = "llama_default";
    else modelParam = "gemini_1_5";
    try {
      const res = await fetch('/api/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: userText, conversation_id: convId, model: modelParam })
      });
      if(!res.ok) {
        const t = await res.text();
        return { error:true, body: t, status: res.status };
      }
      const j = await res.json();
      return { error:false, text: j.output?.content || '' };
    } catch(e) { return { error:true, body: String(e) }; }
  }

  let sending = false;
  async function handleSend(){
    if(sending) return;
    const val = inputEl.value.trim(); if(!val) return;
    addMessage('You', val, true);
    inputEl.value=''; sending=true; sendBtn.disabled=true;
    const typing = document.createElement('div'); typing.className='msg ai'; typing.innerHTML = '<div class="bubble">...</div>'; messagesEl.appendChild(typing); messagesEl.scrollTop = messagesEl.scrollHeight;
    const r = await sendToServer(val);
    typing.remove();
    if (r.error) {
      addMessage('Indresh 2.0', `Error: ${r.body || r.status || 'server unreachable'}`);
    } else {
      const text = r.text || 'क्षमा करें — कोई उत्तर नहीं मिला।';
      addMessage('Indresh 2.0', text);
    }
    sending=false; sendBtn.disabled=false;
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(); });

  clearBtn.addEventListener('click', async ()=>{
    if(!confirm('Clear this chat?')) return;
    try{ await fetch('/api/clear/' + convId, { method:'POST' }); messagesEl.innerHTML = ''; addMessage('Indresh 2.0','Chat cleared.'); }catch(e){ alert('Clear failed'); }
  });

  copyAllBtn.addEventListener('click', async ()=>{
    try{ const res = await fetch('/api/history/' + convId); const j = await res.json(); const text = (j.messages || []).map(m => `${m.created_at||''} [${m.role==='user'?'You':'Indresh 2.0'}]: ${m.content}`).join('\n\n'); await navigator.clipboard.writeText(text); alert('Chat copied'); }catch(e){ alert('Copy failed'); }
  });

  themeBtn.addEventListener('click', ()=>{
    if(document.body.classList.contains('light')) document.body.classList.remove('light');
    else document.body.classList.add('light');
  });

})();
</script>
</body>
</html>
