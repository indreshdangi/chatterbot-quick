<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Indresh 2.0 — AI Assistant</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0ea5a4">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root{ --bg:#0d0d15; --panel:#161622; --user:#2a2a3a; --ai:#1e1e2e; --text:#f0f0f0; --accent:#e0a0ff; --border:rgba(255,255,255,0.06); }
    .theme-light{ --bg:#f9fafc; --panel:#fff; --user:#f0f0f0; --ai:#fff; --text:#111; --accent:#6b5dfc; --border:rgba(0,0,0,0.06); }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; justify-content:center; align-items:center;}
    .card{width:100%; max-width:900px; height:95vh; background:var(--panel); border-radius:16px; display:flex; flex-direction:column; border:1px solid var(--border); overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.3);}
    
    .header{padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
    .logo{font-weight:800; font-size:18px; display:flex; align-items:center; gap:10px;}
    .logo span{background:linear-gradient(135deg, #d0a0ff, #a080ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
    
    .messages{flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:20px;}
    .msg{max-width:85%; line-height:1.6;}
    .msg.user{align-self:flex-end;}
    .msg.ai{align-self:flex-start;}
    
    .bubble{padding:12px 18px; border-radius:12px; position:relative; word-wrap:break-word;}
    .msg.user .bubble{background:var(--user); color:var(--text); border-bottom-right-radius:2px;}
    .msg.ai .bubble{background:var(--ai); border:1px solid var(--border); border-bottom-left-radius:2px;}

    /* Formatting styles inside messages */
    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 700; color: var(--accent); }
    .bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 10px; }
    .bubble code { background: rgba(125,125,125,0.1); padding: 2px 5px; border-radius: 4px; font-family: monospace; }
    .bubble pre { background: #111; padding: 10px; border-radius: 8px; overflow-x: auto; margin-bottom: 10px; }

    .footer{padding:15px; border-top:1px solid var(--border); display:flex; gap:10px;}
    input{flex:1; padding:14px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text); outline:none; font-size:16px;}
    button{padding:10px 20px; border-radius:12px; border:none; background:var(--accent); color:#000; font-weight:bold; cursor:pointer;}
    
    @media (max-width:600px){ .card{height:100vh; border-radius:0;} }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">✨ <span>INDRESH 2.0</span></div>
      <button onclick="document.body.classList.toggle('theme-light')" style="background:transparent; color:var(--text); border:1px solid var(--border); padding:5px 10px;">Theme</button>
    </div>

    <div class="messages" id="messages">
      <div class="msg ai"><div class="bubble">नमस्ते! मैं Indresh 2.0 हूँ। मैं आपकी कैसे मदद कर सकता हूँ?</div></div>
    </div>

    <div class="footer">
      <input id="input" type="text" placeholder="Type a message..." autofocus>
      <button id="sendBtn">Send</button>
    </div>
  </div>

<script>
  const msgs = document.getElementById('messages');
  const inp = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  
  // Unique ID for chat
  const convId = localStorage.getItem('convId') || Date.now().toString();
  localStorage.setItem('convId', convId);

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    // MAGIC LINE: Converts Markdown (**bold**) to HTML
    if(role === 'ai') {
        bubble.innerHTML = marked.parse(text); 
    } else {
        bubble.textContent = text;
    }
    
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function send() {
    const txt = inp.value.trim();
    if(!txt) return;
    
    addMsg('user', txt);
    inp.value = '';
    
    // Loading indicator
    const loadDiv = document.createElement('div');
    loadDiv.className = 'msg ai';
    loadDiv.innerHTML = '<div class="bubble">Typing...</div>';
    msgs.appendChild(loadDiv);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: txt, conversation_id: convId, model: "gemini" }) // Auto-detect handle karega
      });
      
      const data = await res.json();
      loadDiv.remove(); // Remove loading
      
      if(data.output && data.output.content) {
        addMsg('ai', data.output.content);
      } else {
        addMsg('ai', "Error: No response");
      }
    } catch(e) {
      loadDiv.remove();
      addMsg('ai', "Server Error");
    }
  }

  btn.onclick = send;
  inp.onkeydown = (e) => e.key === 'Enter' ? send() : null;
</script>
</body>
</html>
