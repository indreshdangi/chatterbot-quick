<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Indresh 2.0 — Multi-Model AI</title>

  <style>
    :root{
      --bg:#0d0d15; --panel:#161622; --user:#2a2a3a; --ai:#1e1e2e;
      --text:#f0f0f0; --muted:rgba(255,255,255,0.6); --accent:#e0a0ff; --border:rgba(255,255,255,0.06);
    }
    .theme-purple{ --bg:#0b0820; --panel:#120922; --user:#2e153b; --ai:#23102f; --accent:#f0a0ff; }
    .theme-light{ --bg:#f6f7fb; --panel:#ffffff; --user:#f1f1f4; --ai:#ffffff; --text:#111; --muted:rgba(0,0,0,0.6); --accent:#6b5dfc; --border:#e1e1e1; }

    body{
      background:var(--bg); color:var(--text);
      font-family:Inter, system-ui, sans-serif;
      margin:0; padding:20px;
      display:flex; justify-content:center;
    }

    .card{
      width:900px; max-width:100%; height:85vh;
      background:var(--panel); border-radius:12px;
      border:1px solid var(--border);
      display:flex; flex-direction:column;
      box-shadow:0 5px 20px rgba(0,0,0,0.4);
      overflow:hidden;
    }

    .header{padding:10px 18px; display:flex; justify-content:space-between; align-items:center;}
    .logo{display:flex; gap:10px; align-items:center;}
    .logo-icon{
      width:42px;height:42px;border-radius:50%;
      background:linear-gradient(135deg,#d0a0ff,#a080ff);
      display:flex;align-items:center;justify-content:center;
      color:#111;font-weight:800;
    }

    select,button{
      padding:8px 10px;border-radius:8px;
      background:transparent;border:1px solid var(--border);
      color:var(--text);cursor:pointer;
    }

    .messages{
      flex:1; padding:15px; overflow:auto;
    }

    .msg{margin-bottom:14px; max-width:75%;}
    .msg.user{margin-left:auto; text-align:right;}
    .bubble{
      padding:10px 12px; background:var(--ai);
      border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.3);
      white-space:pre-wrap;
    }
    .bubble.user{background:var(--user);}

    .meta{font-size:12px;color:var(--muted); margin-bottom:4px;}
    
    .copy-btn{
      position:absolute; right:-30px; top:5px; opacity:0;
      cursor:pointer; border:none; background:transparent;
      color:var(--accent); font-size:16px;
    }
    .msg:hover .copy-btn{opacity:1;}

    .typing{display:flex; gap:6px; margin-top:5px;}
    .typing .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--accent); animation:bounce 1.1s infinite;
    }
    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    .footer{
      display:flex; gap:10px; padding:12px;
      border-top:1px solid var(--border);
    }
    input{
      flex:1;padding:12px;border-radius:10px;
      border:1px solid var(--border); background:transparent;
      color:var(--text); outline:none;
    }

    .send{
      padding:12px 20px; border-radius:10px;
      background:linear-gradient(135deg,#d0a0ff,#a080ff);
      border:none; color:#111; font-weight:700;
      cursor:pointer;
    }

    .sidebar{
      position:fixed; right:20px; top:20px;
      width:350px; height:85vh;
      background:var(--panel); border:1px solid var(--border);
      border-radius:12px; display:none; padding:15px;
      overflow:auto; box-shadow:0 5px 25px rgba(0,0,0,0.5);
    }
    .sidebar.open{display:block;}
  </style>
</head>

<body>
  <div class="card" id="app">

    <div class="header">
      <div class="logo">
        <div class="logo-icon">AI</div>
        <div>
          <div style="font-weight:700;font-size:18px;">INDRESH 2.0</div>
          <div style="font-size:11px;color:var(--muted);">आपका सहायक</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;align-items:center;">
        <select id="model-select">
          <option value="llama_3_1_8b">Llama 3.1 8B Instant (Default)</option>
          <option value="llama_3_3_70b">Llama 3.3 70B Versatile (Groq)</option>
          <option value="gemini_flash_lite">Gemini 2.5 Flash Lite</option>
        </select>

        <button id="historyBtn">History</button>
        <button id="clearBtn">Clear</button>
        <button id="themeBtn">Theme</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="meta">Indresh 2.0 • अभी</div>
        <div class="bubble">नमस्ते! मैं Indresh 2.0 हूँ। बताइए आज क्या मदद चाहिए?</div>
      </div>
    </div>

    <div class="footer">
      <input id="input" placeholder="Message Indresh 2.0..." />
      <button id="sendBtn" class="send">Send</button>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <h3>Chat History</h3>
    <div id="historyList" style="margin-top:10px;font-size:14px;color:var(--text);"></div>
    <br>
    <button id="closeSidebar">Close</button>
  </div>

<script>
(function(){

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const sidebar = document.getElementById("sidebar");
  const historyBtn = document.getElementById("historyBtn");
  const closeSidebar = document.getElementById("closeSidebar");

  let convId = localStorage.getItem("conv_v3") || Date.now().toString();
  localStorage.setItem("conv_v3", convId);

  function addMessage(role, text){
    const box = document.createElement("div");
    box.className = "msg " + (role==="user" ? "user" : "ai");

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = (role==="user"?"You":"Indresh 2.0") + " • " + new Date().toLocaleTimeString();

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    box.appendChild(meta);
    box.appendChild(bubble);
    messagesEl.appendChild(box);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping(){
    const d = document.createElement("div");
    d.className = "msg ai";
    d.innerHTML = `<div class="bubble"><div class="typing">
      <div class='dot'></div><div class='dot'></div><div class='dot'></div>
    </div></div>`;
    messagesEl.appendChild(d);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return d;
  }

  async function sendToServer(msg){
    const model = document.getElementById("model-select").value;

    const res = await fetch("/api/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: msg,
        conversation_id: convId,
        model
      })
    });

    const data = await res.json();
    return data.output?.content || "No reply.";
  }

  async function handleSend(){
    const text = inputEl.value.trim();
    if(!text) return;

    addMessage("user", text);
    inputEl.value = "";

    const t = showTyping();

    const reply = await sendToServer(text);

    t.remove();
    addMessage("assistant", reply);
  }

  sendBtn.addEventListener("click", handleSend);
  inputEl.addEventListener("keydown", e => { if(e.key==="Enter") handleSend(); });

  historyBtn.addEventListener("click", ()=> sidebar.classList.add("open"));
  closeSidebar.addEventListener("click", ()=> sidebar.classList.remove("open"));

})();
</script>

</body>
</html>
